<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>DiamondPro SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:14px;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

button{
background:#3b82f6;
border:none;
padding:10px;
border-radius:8px;
color:white;
cursor:pointer;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

.success{
color:#22c55e;
}

</style>

</head>

<body>

<header>
💎 DiamondPro SaaS Demo
</header>

<div class="container">

<div class="card">

<h3>Yeni Öğrenci</h3>

<input id="name" placeholder="Ad">
<input id="phone" placeholder="Telefon">
<input id="sessions" placeholder="Seans">

<button onclick="addStudent()">Ekle</button>

</div>

<div class="card">

<h3>Ödeme Kaydı</h3>

<input id="payStudent" placeholder="Öğrenci ID">
<input id="amount" placeholder="Tutar">

<button onclick="addPayment()">Ödeme Kaydet</button>

</div>

<div class="card">

<h3>Gelir Grafiği</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>QR Check-in</h3>

<div id="reader" style="width:300px"></div>

<div id="checkResult"></div>

</div>

<div class="card">

<h3>AI Analiz</h3>

<div id="ai"></div>

</div>

<div class="card">

<h3>Öğrenciler</h3>

<ul id="students"></ul>

</div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("students")||"[]")
let payments = JSON.parse(localStorage.getItem("payments")||"[]")
let attendance = JSON.parse(localStorage.getItem("attendance")||"[]")

function save(){

localStorage.setItem("students",JSON.stringify(students))
localStorage.setItem("payments",JSON.stringify(payments))
localStorage.setItem("attendance",JSON.stringify(attendance))

}

function renderStudents(){

const list=document.getElementById("students")

list.innerHTML=""

students.forEach(s=>{

list.innerHTML+=`
<li>

ID:${s.id}
${s.name}
Seans:${s.sessions}

</li>
`

})

}

function addStudent(){

let student={

id:Date.now(),

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

sessions:Number(document.getElementById("sessions").value)

}

students.push(student)

save()

renderStudents()

}

function addPayment(){

payments.push({

student:document.getElementById("payStudent").value,

amount:Number(document.getElementById("amount").value),

date:new Date()

})

save()

updateChart()

}

function checkin(studentId){

let student=students.find(s=>s.id==studentId)

if(!student){

document.getElementById("checkResult").innerHTML="Öğrenci bulunamadı"

return

}

if(student.sessions<=0){

document.getElementById("checkResult").innerHTML="Seans bitmiş"

return

}

student.sessions--

attendance.push({

student:studentId,

time:new Date()

})

save()

renderStudents()

document.getElementById("checkResult").innerHTML=
"<span class='success'>Seans düşüldü</span>"

updateAI()

}

function updateChart(){

let total = payments.reduce((a,b)=>a+b.amount,0)

chart.data.datasets[0].data=[total]

chart.update()

}

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{

type:"bar",

data:{
labels:["Gelir"],
datasets:[{
label:"Toplam",
data:[0]
}]
}

})

function updateAI(){

let hours={}

attendance.forEach(a=>{

let h=new Date(a.time).getHours()

hours[h]=(hours[h]||0)+1

})

let busiest=Object.keys(hours).reduce((a,b)=>hours[a]>hours[b]?a:b,0)

document.getElementById("ai").innerHTML=
"En yoğun saat: "+busiest+":00"

}

const scanner=new Html5QrcodeScanner("reader",{fps:10})

scanner.render((result)=>{

checkin(Number(result))

})

renderStudents()

updateChart()

updateAI()

</script>

</body>

</html>
