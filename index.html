<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DiamondPro V32 | Elite Studio Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #050505; --card: #111113; --accent: #d2fe00; --text: #ffffff; --muted: #8e8e93; --border: #1c1c1e; --danger: #ff3b30; --success: #34c759; --warning: #ffcc00; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 110px; }
        
        /* UI Components */
        .top-nav { display: flex; justify-content: center; padding: 15px; position: sticky; top: 0; z-index: 9000; background: var(--bg); border-bottom: 1px solid var(--border); }
        .exit-btn { background: var(--danger); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 800; font-size: 11px; cursor: pointer; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; display: none; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #1a1a1c; color: white; margin-bottom: 10px; outline: none; }
        
        /* Specialized UI */
        .input-group { position: relative; width: 100%; }
        .eye-btn { position: absolute; right: 15px; top: 15px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; z-index: 5; }
        .lang-switch { position: fixed; top: 15px; right: 15px; z-index: 10001; background: var(--accent); color: black; padding: 8px 12px; border-radius: 10px; font-weight: 800; cursor: pointer; border: none; font-size: 11px; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,12,0.95); backdrop-filter: blur(20px); display: none; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--border); z-index: 5000; }
        .nav-item { color: var(--muted); font-size: 10px; text-align: center; flex: 1; cursor: pointer; font-weight: 600; }
        .nav-item.active { color: var(--accent); }
        
        /* Financial & Calendar */
        .f-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; text-align: center; }
        .cal-slot { padding: 12px; border-radius: 10px; background: #1a1a1c; font-size: 13px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .slot-free { color: var(--success); } .slot-busy { color: var(--danger); font-weight: 800; border-color: var(--danger); }
        
        /* Notification & Logs */
        .warning-low { color: var(--warning) !important; animation: blink 1.5s infinite; }
        .warning-empty { color: var(--danger) !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; padding: 20px; overflow-y: auto; align-items: center; justify-content: center; }
        .log-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; justify-content: space-between; }
    </style>
</head>
<body onload="app.init()">

<button class="lang-switch" onclick="ui.toggleLang()" id="langBtn">EN</button>

<div id="auth-selection" style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;">
    <h1 style="letter-spacing: -2px; font-weight: 800; font-size: 32px; color: var(--accent);">DIAMOND PRO</h1>
    <button class="btn" onclick="ui.showGate('admin')">👑 Yönetici Paneli</button>
    <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border)" onclick="ui.showGate('member')">👤 Üye Girişi</button>
</div>

<div id="gate-page" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="max-width:380px; width:100%;">
        <h3 id="txt-gateTitle" style="margin-top:0">Giriş Yap</h3>
        <div class="input-group">
            <input type="password" id="gate-input" placeholder="Şifre / Telefon">
            <button class="eye-btn" onclick="ui.togglePass()">👁️</button>
        </div>
        <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); margin: 5px 0 15px 0; cursor:pointer;">
            <input type="checkbox" id="rememberMe" style="width:18px; height:18px; margin:0"> <span id="txt-remember">Beni Hatırla</span>
        </label>
        <button class="btn" onclick="app.processLogin()" id="txt-btnLogin">Giriş Yap</button>
        <button onclick="ui.back()" style="background:none; border:none; color:var(--muted); margin-top:15px; width:100%; cursor:pointer;">Geri Dön</button>
    </div>
</div>

<div id="admin-panel" style="display:none;">
    <div class="top-nav"><button class="exit-btn" onclick="app.logout()">ÇIKIŞ</button></div>
    <div class="container" style="display:block;">
        
        <div class="card" style="border: 1px solid var(--accent); background: linear-gradient(135deg, #111, #000);">
            <h4 style="margin:0; color:var(--accent);">🔗 Uygulamayı Paylaş</h4>
            <button class="btn" onclick="app.shareApp()" style="background:white; color:black; margin-top:10px; font-size:12px;">Link Gönder</button>
        </div>

        <div class="card">
            <h4 id="txt-finTitle">Finansal Durum</h4>
            <div class="f-grid">
                <div><small>Gelir</small><div id="total-income" style="color:var(--success); font-weight:800">0₺</div></div>
                <div><small>Gider</small><div id="total-expense" style="color:var(--danger); font-weight:800">0₺</div></div>
                <div><small>Net</small><div id="total-balance" style="color:var(--accent); font-weight:800">0₺</div></div>
            </div>
            <input type="text" id="exp-desc" placeholder="Gider Açıklaması">
            <input type="number" id="exp-val" placeholder="Tutar ₺">
            <button class="btn" style="background:#1a1a1c; color:white;" onclick="app.addExpense()">Gider Ekle</button>
        </div>

        <div class="card" style="text-align:center; border: 2px solid var(--accent)">
            <h4 id="txt-adminScan">Stüdyo Giriş QR</h4>
            <div id="admin-static-qr" style="background:white; padding:10px; display:inline-block; border-radius:15px;"></div>
        </div>

        <div class="card">
            <h4 id="txt-studioInfo">İletişim Ayarları</h4>
            <input type="text" id="conf-wp" placeholder="WhatsApp (905...)">
            <input type="text" id="conf-ig" placeholder="Instagram Kullanıcı Adı">
            <button class="btn" style="background:var(--success)" onclick="app.saveConfig()" id="txt-saveConf">Güncelle</button>
        </div>

        <div class="card">
            <h4 id="txt-addMember">Yeni Üye Ekle</h4>
            <input type="text" id="mName" placeholder="Ad Soyad">
            <input type="tel" id="mPhone" placeholder="Telefon (Giriş Şifresi)">
            <input type="number" id="mPack" placeholder="Seans">
            <input type="number" id="mPrice" placeholder="Paket Ücreti ₺">
            <button class="btn" onclick="app.addMember()" id="txt-save">Kaydet</button>
        </div>

        <div id="admin-list"></div>

        <div class="card">
            <h3>Randevu Programı</h3>
            <input type="date" id="admin-date-picker" onchange="app.renderSchedule()">
            <div id="admin-cal-grid" style="display:grid; grid-template-columns:80px 1fr; gap:8px;"></div>
        </div>
    </div>
</div>

<div id="member-panel" style="display:none;">
    <div class="top-nav"><button class="exit-btn" onclick="app.logout()">ÇIKIŞ</button></div>
    <div class="container" style="display:block;">
        <div id="tab-home" class="tab-content active">
            <div class="card" style="text-align:center;">
                <h1 id="u-sess" style="font-size:80px; margin:0;">0</h1>
                <p style="color:var(--muted); font-size:12px; font-weight:800">KALAN SEANS</p>
                <div id="member-reader" style="width:100%; border-radius:20px; overflow:hidden; display:none; border:2px solid var(--accent); margin-bottom:15px;"></div>
                <button class="btn" onclick="app.startMemberScanner()">📷 QR Okut ve Giriş Yap</button>
            </div>
            <div class="card"><h4>Bize Ulaşın</h4><div id="u-contact-area" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div></div>
        </div>
        <div id="tab-cal" class="tab-content" style="display:none;">
            <div class="card"><input type="date" id="user-date-picker" onchange="app.renderSchedule()"><div id="user-cal-grid" style="display:grid; grid-template-columns:80px 1fr; gap:8px;"></div></div>
        </div>
    </div>
</div>

<div id="log-modal" class="modal">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h3 id="modal-title">Giriş Geçmişi</h3>
        <div id="log-list" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;"></div>
        <button class="btn" onclick="ui.closeLogs()" style="background:var(--danger); color:white">Kapat</button>
    </div>
</div>

<nav class="nav" id="member-nav">
    <div class="nav-item active" onclick="app.switchTab('tab-home', this)">🏠<br>Panel</div>
    <div class="nav-item" onclick="app.switchTab('tab-cal', this)">📅<br>Takvim</div>
</nav>

<script>
const langData = {
    tr: { gateTitle: "Giriş", btnLogin: "Giriş Yap", remember: "Beni Hatırla", finTitle: "Finansal Durum", adminScan: "Stüdyo Giriş QR", studioInfo: "İletişim Ayarları", saveConf: "Bilgileri Güncelle", addMember: "Üye Ekle", save: "Kaydet" },
    en: { gateTitle: "Login", btnLogin: "Login", remember: "Remember Me", finTitle: "Finance", adminScan: "Check-in QR", studioInfo: "Settings", saveConf: "Update Info", addMember: "Add Member", save: "Save" }
};

const app = {
    db: { members: [], config: { wp: "", ig: "" }, schedule: {}, expenses: [] },
    user: null,

    init() {
        const saved = localStorage.getItem('studio_v32');
        if (saved) this.db = JSON.parse(saved);
        ui.lang = localStorage.getItem('studio_lang') || 'tr';
        ui.updateTexts();
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('admin-date-picker').value = today;
        document.getElementById('user-date-picker').value = today;
        this.checkRemember();
        this.updateFinance();
    },

    save() { localStorage.setItem('studio_v32', JSON.stringify(this.db)); },

    shareApp: async () => {
        const data = { title: 'Diamond Pro', text: 'Stüdyo takip uygulamamız:', url: window.location.href };
        try { if(navigator.share) await navigator.share(data); else { navigator.clipboard.writeText(window.location.href); alert("Link kopyalandı!"); } } catch(e){}
    },

    checkRemember() {
        const saved = localStorage.getItem('sm_remember_v32');
        if(saved) {
            const d = JSON.parse(saved); ui.mode = d.mode;
            if(ui.mode === 'admin' && d.val === "1234") this.loadPanel('admin-panel');
            else { const m = this.db.members.find(u => u.phone === d.val); if(m) { this.user = m; this.loadPanel('member-panel'); } }
        }
    },

    processLogin() {
        const val = document.getElementById('gate-input').value;
        const remember = document.getElementById('rememberMe').checked;
        if(ui.mode === 'admin' && val === "1234") {
            if(remember) localStorage.setItem('sm_remember_v32', JSON.stringify({val, mode:'admin'}));
            this.loadPanel('admin-panel');
        } else {
            const m = this.db.members.find(u => u.phone === val);
            if(m) {
                if(remember) localStorage.setItem('sm_remember_v32', JSON.stringify({val, mode:'member'}));
                this.user = m; this.loadPanel('member-panel');
            } else alert("Üye Bulunamadı!");
        }
    },

    loadPanel(id) {
        document.getElementById('gate-page').style.display='none';
        document.getElementById('auth-selection').style.display='none';
        document.getElementById(id).style.display='block';
        if(id==='admin-panel') {
            this.renderAdmin();
            document.getElementById('admin-static-qr').innerHTML = "";
            new QRCode(document.getElementById("admin-static-qr"), { text: "STUDIO_CHECKIN", width: 160, height: 160 });
            document.getElementById('conf-wp').value = this.db.config.wp || "";
            document.getElementById('conf-ig').value = this.db.config.ig || "";
        } else {
            document.getElementById('member-nav').style.display='flex';
            this.renderUser();
        }
        this.renderSchedule();
    },

    addMember() {
        const n = document.getElementById('mName').value, p = document.getElementById('mPhone').value;
        if(!n || !p) return;
        this.db.members.push({ id: Date.now(), name: n, phone: p, sessions: parseInt(document.getElementById('mPack').value)||0, price: parseFloat(document.getElementById('mPrice').value)||0, logs: [] });
        this.save(); this.renderAdmin(); this.updateFinance();
        document.getElementById('mName').value = ""; document.getElementById('mPhone').value = "";
    },

    renderAdmin() {
        const list = document.getElementById('admin-list'); list.innerHTML = "";
        this.db.members.forEach(m => {
            const status = m.sessions <= 2 ? (m.sessions === 0 ? 'color:var(--danger)' : 'color:var(--warning)') : '';
            list.innerHTML += `<div class="card">
                <b style="${status}">${m.name}</b> (${m.sessions} Seans) - ${m.price}₺<br>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button class="btn" style="padding:8px; font-size:10px; margin:0; background:white" onclick="app.showLogs(${m.id})">Geçmiş</button>
                    <button class="btn" style="padding:8px; font-size:10px; margin:0; background:var(--accent)" onclick="let s=prompt('Seans?', ${m.sessions}); if(s){m.sessions=parseInt(s); app.save(); app.renderAdmin();}">Düzenle</button>
                    <button class="btn" style="padding:8px; font-size:10px; margin:0; background:var(--danger); color:white" onclick="app.deleteMember(${m.id})">Sil</button>
                </div>
            </div>`;
        });
    },

    showLogs(id) {
        const user = this.db.members.find(m => m.id === id);
        document.getElementById('modal-title').innerText = user.name + " Geçmişi";
        const logList = document.getElementById('log-list');
        logList.innerHTML = (user.logs && user.logs.length) ? user.logs.reverse().map(l => `<div class="log-item"><span>📅 ${l.date}</span><span>${l.time}</span></div>`).join('') : "Kayıt yok.";
        document.getElementById('log-modal').style.display = 'flex';
    },

    renderUser() {
        const sessEl = document.getElementById('u-sess');
        const count = this.user.sessions;
        sessEl.innerText = count;
        sessEl.className = ""; 
        if(count === 0) sessEl.classList.add('warning-empty');
        else if(count <= 2) sessEl.classList.add('warning-low');

        const area = document.getElementById('u-contact-area'); area.innerHTML = "";
        if(this.db.config.wp) area.innerHTML += `<button class="btn" onclick="window.open('https://wa.me/${this.db.config.wp}')">WhatsApp</button>`;
        if(this.db.config.ig) area.innerHTML += `<button class="btn" style="background:linear-gradient(45deg, #f09433, #bc1888)" onclick="window.open('https://instagram.com/${this.db.config.ig}')">Instagram</button>`;
    },

    startMemberScanner() {
        if(this.user.sessions <= 0) { alert("Seansınız bitmiş!"); return; }
        const r = document.getElementById('member-reader'); r.style.display='block';
        const sc = new Html5Qrcode("member-reader");
        sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            if(text === "STUDIO_CHECKIN") {
                this.user.sessions--;
                const now = new Date();
                if(!this.user.logs) this.user.logs = [];
                this.user.logs.push({ date: now.toLocaleDateString('tr-TR'), time: now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'}) });
                this.save(); this.renderUser(); alert("Giriş Başarılı!");
            }
            sc.stop(); r.style.display='none';
        }).catch(() => alert("Kamera İzni Gerekli!"));
    },

    updateFinance() {
        const inc = this.db.members.reduce((a, m) => a + (m.price || 0), 0);
        const exp = this.db.expenses.reduce((a, e) => a + (e.val || 0), 0);
        document.getElementById('total-income').innerText = inc + "₺";
        document.getElementById('total-expense').innerText = exp + "₺";
        document.getElementById('total-balance').innerText = (inc - exp) + "₺";
    },

    addExpense() {
        const d = document.getElementById('exp-desc').value, v = parseFloat(document.getElementById('exp-val').value);
        if(!d || !v) return; this.db.expenses.push({ desc: d, val: v }); this.save(); this.updateFinance();
        document.getElementById('exp-desc').value = ""; document.getElementById('exp-val').value = "";
    },

    saveConfig() {
        this.db.config.wp = document.getElementById('conf-wp').value;
        this.db.config.ig = document.getElementById('conf-ig').value;
        this.save(); alert("Güncellendi!");
    },

    renderSchedule() {
        const date = ui.mode==='admin'?document.getElementById('admin-date-picker').value:document.getElementById('user-date-picker').value;
        const aGrid = document.getElementById('admin-cal-grid'), uGrid = document.getElementById('user-cal-grid');
        if(!aGrid || !uGrid) return; aGrid.innerHTML = uGrid.innerHTML = "";
        for(let i=7; i<=21; i++){
            const t = i+":00", key = date+"_"+t, state = this.db.schedule[key]||"FREE";
            const html = `<div style="padding:10px; font-size:12px">${t}</div><div class="cal-slot ${state==='FREE'?'slot-free':'slot-busy'}" data-key="${key}">${state==='FREE'?'MÜSAİT':'DOLU'}</div>`;
            aGrid.innerHTML += html; uGrid.innerHTML += html;
        }
        document.querySelectorAll('#admin-cal-grid .cal-slot').forEach(el => {
            el.onclick = () => { this.db.schedule[el.dataset.key] = (this.db.schedule[el.dataset.key]||"FREE")==="FREE"?"BUSY":"FREE"; this.save(); this.renderSchedule(); };
        });
    },

    deleteMember(id) { if(confirm('Silinsin mi?')) { this.db.members = this.db.members.filter(x=>x.id!==id); this.save(); this.renderAdmin(); this.updateFinance(); }},
    logout() { localStorage.removeItem('sm_remember_v32'); location.reload(); },
    switchTab(id, el) { 
        document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none'); document.getElementById(id).style.display='block'; 
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active'); this.renderSchedule(); 
    }
};

const ui = {
    lang: 'tr',
    showGate(m) { this.mode=m; document.getElementById('auth-selection').style.display='none'; document.getElementById('gate-page').style.display='flex'; },
    back() { document.getElementById('gate-page').style.display='none'; document.getElementById('auth-selection').style.display='flex'; },
    togglePass() { const inp = document.getElementById('gate-input'); inp.type = inp.type === 'password' ? 'text' : 'password'; },
    closeLogs() { document.getElementById('log-modal').style.display = 'none'; },
    toggleLang() { this.lang = this.lang==='tr'?'en':'tr'; localStorage.setItem('studio_lang', this.lang); document.getElementById('langBtn').innerText=this.lang.toUpperCase(); this.updateTexts(); app.renderSchedule(); },
    updateTexts() {
        const d = langData[this.lang];
        for(let key in d) { const el = document.getElementById('txt-'+key); if(el) { if(el.tagName === 'INPUT') el.placeholder = d[key]; else el.innerHTML = d[key]; } }
    }
};
</script>
</body>
</html>
