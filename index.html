<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta charset="UTF-8">

<title>DiamondPro Mobile</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
}

header{
padding:15px;
text-align:center;
font-size:20px;
background:#020617;
}

.container{
padding:10px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:12px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:15px;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px;
}

nav button{
width:auto;
background:none;
font-size:14px;
}

.success{
color:#22c55e;
}

</style>

</head>

<body>

<header>
💎 DiamondPro Mobile
</header>

<div class="container" id="home">

<div class="card">

<h3>Yeni Öğrenci</h3>

<input id="name" placeholder="Ad Soyad">
<input id="sessions" placeholder="Seans">

<button onclick="addStudent()">Kaydet</button>

</div>

<div class="card">

<h3>Gelir Grafiği</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>AI Analiz</h3>

<div id="ai"></div>

</div>

</div>

<div class="container" id="qr" style="display:none">

<div class="card">

<h3>QR Check-in</h3>

<div id="reader"></div>

<div id="result"></div>

</div>

</div>

<div class="container" id="students" style="display:none">

<div class="card">

<h3>Öğrenciler</h3>

<ul id="list"></ul>

</div>

</div>

<nav>

<button onclick="show('home')">🏠</button>
<button onclick="show('qr')">📷</button>
<button onclick="show('students')">👥</button>

</nav>

<script>

let students = JSON.parse(localStorage.getItem("students")||"[]")
let attendance = JSON.parse(localStorage.getItem("attendance")||"[]")

function save(){

localStorage.setItem("students",JSON.stringify(students))
localStorage.setItem("attendance",JSON.stringify(attendance))

}

function show(id){

document.getElementById("home").style.display="none"
document.getElementById("qr").style.display="none"
document.getElementById("students").style.display="none"

document.getElementById(id).style.display="block"

}

function addStudent(){

let student={
id:Date.now(),
name:document.getElementById("name").value,
sessions:Number(document.getElementById("sessions").value)
}

students.push(student)

save()

renderStudents()

}

function renderStudents(){

let list=document.getElementById("list")

list.innerHTML=""

students.forEach(s=>{

list.innerHTML+=`
<li>
${s.name}
(Seans:${s.sessions})
<br>
QR: ${s.id}
</li>
`

})

}

function checkin(id){

let student=students.find(s=>s.id==id)

if(!student){

document.getElementById("result").innerHTML="Öğrenci bulunamadı"

return

}

if(student.sessions<=0){

document.getElementById("result").innerHTML="Seans bitti"

return

}

student.sessions--

attendance.push({id,time:new Date()})

save()

document.getElementById("result").innerHTML=
"<span class='success'>Giriş kaydedildi</span>"

updateAI()

}

function updateAI(){

let hours={}

attendance.forEach(a=>{

let h=new Date(a.time).getHours()

hours[h]=(hours[h]||0)+1

})

let busiest=Object.keys(hours).reduce((a,b)=>hours[a]>hours[b]?a:b,0)

document.getElementById("ai").innerHTML="En yoğun saat: "+busiest+":00"

}

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Gelir"],
datasets:[{
data:[0]
}]
}
})

const scanner=new Html5QrcodeScanner("reader",{fps:10})

scanner.render(result=>{

checkin(Number(result))

})

renderStudents()

updateAI()

</script>

</body>

</html>
