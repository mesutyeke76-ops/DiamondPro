<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DiamondPro SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px;
}

.success{color:#22c55e;}

</style>

</head>

<body>

<header>💎 DiamondPro</header>

<div id="login" class="container">

<div class="card">

<h3>Yönetici Girişi</h3>

<input id="user" placeholder="Kullanıcı">
<input id="pass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş</button>

</div>

</div>

<div id="app" style="display:none">

<div class="container" id="home">

<div class="card">

<h3>Yeni Öğrenci</h3>

<input id="name" placeholder="Ad">
<input id="sessions" placeholder="Seans">

<button onclick="addStudent()">Kaydet</button>

</div>

<div class="card">

<h3>Ödeme</h3>

<input id="payStudent" placeholder="Öğrenci ID">
<input id="amount" placeholder="Tutar">

<button onclick="addPayment()">Ödeme Kaydet</button>

</div>

<div class="card">

<h3>Gelir Grafiği</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>AI Analiz</h3>

<div id="ai"></div>

</div>

</div>

<div class="container" id="qr" style="display:none">

<div class="card">

<h3>QR Check-in</h3>

<div id="reader"></div>

<div id="result"></div>

</div>

</div>

<div class="container" id="students" style="display:none">

<div class="card">

<h3>Öğrenciler</h3>

<ul id="list"></ul>

</div>

</div>

</div>

<nav>

<button onclick="show('home')">🏠</button>
<button onclick="show('qr')">📷</button>
<button onclick="show('students')">👥</button>

</nav>

<script>

let students=JSON.parse(localStorage.getItem("students")||"[]")
let payments=JSON.parse(localStorage.getItem("payments")||"[]")
let attendance=JSON.parse(localStorage.getItem("attendance")||"[]")

function save(){

localStorage.setItem("students",JSON.stringify(students))
localStorage.setItem("payments",JSON.stringify(payments))
localStorage.setItem("attendance",JSON.stringify(attendance))

}

function login(){

if(
document.getElementById("user").value=="admin" &&
document.getElementById("pass").value=="1234"
){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

}

}

function show(id){

["home","qr","students"].forEach(x=>{

document.getElementById(x).style.display="none"

})

document.getElementById(id).style.display="block"

}

function addStudent(){

let student={
id:Date.now(),
name:document.getElementById("name").value,
sessions:Number(document.getElementById("sessions").value)
}

students.push(student)

save()

renderStudents()

}

function renderStudents(){

let list=document.getElementById("list")

list.innerHTML=""

students.forEach(s=>{

list.innerHTML+=`
<li>
${s.name} (Seans:${s.sessions})
<br>
QR ID:${s.id}
</li>
`

})

}

function addPayment(){

payments.push({

student:document.getElementById("payStudent").value,
amount:Number(document.getElementById("amount").value),
time:new Date()

})

save()

updateChart()

}

function checkin(id){

let student=students.find(s=>s.id==id)

if(!student){

document.getElementById("result").innerHTML="Öğrenci bulunamadı"

return

}

if(student.sessions<=0){

document.getElementById("result").innerHTML="Seans bitti"

return

}

student.sessions--

attendance.push({id,time:new Date()})

save()

renderStudents()

document.getElementById("result").innerHTML=
"<span class='success'>Seans düşüldü</span>"

updateAI()

}

function updateAI(){

let hours={}

attendance.forEach(a=>{

let h=new Date(a.time).getHours()

hours[h]=(hours[h]||0)+1

})

let busiest=Object.keys(hours).reduce((a,b)=>hours[a]>hours[b]?a:b,0)

document.getElementById("ai").innerHTML="En yoğun saat: "+busiest+":00"

}

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Gelir"],
datasets:[{data:[0]}]
}
})

function updateChart(){

let total=payments.reduce((a,b)=>a+b.amount,0)

chart.data.datasets[0].data=[total]

chart.update()

}

const scanner=new Html5QrcodeScanner("reader",{fps:10})

scanner.render(result=>{

checkin(Number(result))

})

renderStudents()
updateChart()
updateAI()

</script>

</body>
</html>
