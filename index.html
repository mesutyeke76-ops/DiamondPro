<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DiamondPro SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

/* GLOBAL */

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:18px;
text-align:center;
font-size:22px;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#3b82f6;
color:white;
font-size:15px;
}

/* SPLASH */

#splash{

position:fixed;
top:0;
left:0;
right:0;
bottom:0;

background:#020617;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

font-size:30px;

animation:splash 3s forwards;

}

@keyframes splash{

0%{opacity:1}
85%{opacity:1}
100%{opacity:0;visibility:hidden}

}

/* NAV */

nav{

position:fixed;
bottom:0;
left:0;
right:0;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px;

}

nav button{

width:auto;
background:none;

}

/* LIST */

ul{

list-style:none;
padding:0;

}

li{

background:#334155;
padding:10px;
margin-bottom:6px;
border-radius:8px;

}

/* SUCCESS */

.success{
color:#22c55e;
}

.error{
color:#ef4444;
}

</style>

</head>

<body>

<div id="splash">

💎 DiamondPro
<div style="font-size:14px;margin-top:10px">
Studio Management System
</div>

</div>

<header>

DiamondPro Dashboard

</header>

<div class="container" id="loginPage">

<div class="card">

<h3>Yönetici Girişi</h3>

<input id="adminUser" placeholder="Kullanıcı">
<input id="adminPass" type="password" placeholder="Şifre">

<button onclick="adminLogin()">Giriş</button>

</div>

<div class="card">

<h3>Üye Girişi</h3>

<input id="memberTel" placeholder="Telefon">
<input id="memberPass" placeholder="Şifre">

<button onclick="memberLogin()">Giriş</button>

</div>

<div id="loginError"></div>

</div>

<div id="adminPanel" style="display:none">

<div class="container">

<div class="card">

<h3>Yeni Üye</h3>

<input id="name" placeholder="Ad">
<input id="tel" placeholder="Telefon">
<input id="sessions" placeholder="Seans">

<button onclick="addMember()">Üye Ekle</button>

</div>

<div class="card">

<h3>QR Check-in</h3>

<div id="reader"></div>

<div id="checkinResult"></div>

</div>

<div class="card">

<h3>Üyeler</h3>

<ul id="memberList"></ul>

</div>

<div class="card">

<h3>Ders Takvimi</h3>

<input id="lessonName" placeholder="Ders">
<input id="lessonTime" placeholder="Saat">

<button onclick="addLesson()">Ders Ekle</button>

<ul id="lessonList"></ul>

</div>

<div class="card">

<h3>Eğitmen Paneli</h3>

<input id="trainerName" placeholder="Eğitmen">

<button onclick="addTrainer()">Eğitmen Ekle</button>

<ul id="trainerList"></ul>

</div>

<div class="card">

<h3>Ödeme Ekle</h3>

<input id="payStudent" placeholder="Öğrenci ID">
<input id="amount" placeholder="Tutar">

<button onclick="addPayment()">Ödeme Kaydet</button>

</div>

<div class="card">

<h3>Gelir Grafiği</h3>

<canvas id="incomeChart"></canvas>

</div>

<div class="card">

<h3>AI Analiz</h3>

<div id="aiBox"></div>

</div>

</div>

</div>

<div id="memberPanel" style="display:none">

<div class="container">

<div class="card">

<h3>Üye Paneli</h3>

<div id="memberInfo"></div>

</div>

</div>

</div>

<nav>

<button onclick="showAdmin()">🏠</button>
<button onclick="showMembers()">👥</button>
<button onclick="showQR()">📷</button>

</nav>

<script>

/* LOGIN */

const ADMIN_USER="admin"
const ADMIN_PASS="DP2026secure"

let members=JSON.parse(localStorage.getItem("members")||"[]")
let lessons=JSON.parse(localStorage.getItem("lessons")||"[]")
let trainers=JSON.parse(localStorage.getItem("trainers")||"[]")
let payments=JSON.parse(localStorage.getItem("payments")||"[]")
let attendance=JSON.parse(localStorage.getItem("attendance")||"[]")

function save(){

localStorage.setItem("members",JSON.stringify(members))
localStorage.setItem("lessons",JSON.stringify(lessons))
localStorage.setItem("trainers",JSON.stringify(trainers))
localStorage.setItem("payments",JSON.stringify(payments))
localStorage.setItem("attendance",JSON.stringify(attendance))

}

/* ADMIN LOGIN */

function adminLogin(){

let u=document.getElementById("adminUser").value
let p=document.getElementById("adminPass").value

if(u===ADMIN_USER && p===ADMIN_PASS){

document.getElementById("loginPage").style.display="none"
document.getElementById("adminPanel").style.display="block"

renderAll()

}else{

document.getElementById("loginError").innerHTML="<span class='error'>Hatalı giriş</span>"

}

}

/* MEMBER LOGIN */

function memberLogin(){

let tel=document.getElementById("memberTel").value
let pass=document.getElementById("memberPass").value

let member=members.find(m=>m.tel===tel)

if(!member){

alert("Üye bulunamadı")
return

}

if(pass!==tel){

alert("Şifre telefon numarası olmalı")
return

}

document.getElementById("loginPage").style.display="none"
document.getElementById("memberPanel").style.display="block"

document.getElementById("memberInfo").innerHTML=
`
Ad: ${member.name}<br>
Kalan Seans: ${member.sessions}<br>
QR ID: ${member.id}
`

}

/* MEMBER ADD */

function addMember(){

let m={

id:Date.now(),
name:document.getElementById("name").value,
tel:document.getElementById("tel").value,
sessions:Number(document.getElementById("sessions").value)

}

members.push(m)

save()

renderMembers()

}

/* LESSON ADD */

function addLesson(){

let l={

name:document.getElementById("lessonName").value,
time:document.getElementById("lessonTime").value

}

lessons.push(l)

save()

renderLessons()

}

/* TRAINER */

function addTrainer(){

let t=document.getElementById("trainerName").value

trainers.push(t)

save()

renderTrainers()

}

/* PAYMENT */

function addPayment(){

let amount=Number(document.getElementById("amount").value)

payments.push({

amount:amount,
date:new Date()

})

save()

updateChart()

}

/* QR CHECKIN */

function checkin(id){

let member=members.find(m=>m.id==id)

if(!member){

document.getElementById("checkinResult").innerText="Üye bulunamadı"
return

}

if(member.sessions<=0){

document.getElementById("checkinResult").innerText="Seans bitti"
return

}

member.sessions--

attendance.push({

id:id,
time:new Date()

})

save()

renderMembers()

document.getElementById("checkinResult").innerHTML="<span class='success'>Seans düşüldü</span>"

updateAI()

}

/* RENDER */

function renderMembers(){

let list=document.getElementById("memberList")

list.innerHTML=""

members.forEach(m=>{

list.innerHTML+=`
<li>
${m.name}
<br>
Tel:${m.tel}
<br>
Seans:${m.sessions}
<br>
QR:${m.id}
</li>
`

})

}

function renderLessons(){

let list=document.getElementById("lessonList")

list.innerHTML=""

lessons.forEach(l=>{

list.innerHTML+=`
<li>
${l.name} - ${l.time}
</li>
`

})

}

function renderTrainers(){

let list=document.getElementById("trainerList")

list.innerHTML=""

trainers.forEach(t=>{

list.innerHTML+=`
<li>${t}</li>
`

})

}

/* CHART */

const ctx=document.getElementById("incomeChart")

const chart=new Chart(ctx,{
type:"line",
data:{labels:["Gelir"],datasets:[{data:[0]}]}
})

function updateChart(){

let total=payments.reduce((a,b)=>a+b.amount,0)

chart.data.datasets[0].data=[total]

chart.update()

}

/* AI ANALYSIS */

function updateAI(){

let hours={}

attendance.forEach(a=>{

let h=new Date(a.time).getHours()

hours[h]=(hours[h]||0)+1

})

let busiest=Object.keys(hours).reduce((a,b)=>hours[a]>hours[b]?a:b,0)

document.getElementById("aiBox").innerHTML=
"En yoğun saat: "+busiest+":00"

}

/* QR */

const scanner=new Html5QrcodeScanner("reader",{fps:10})

scanner.render(result=>{

checkin(Number(result))

})

/* INIT */

function renderAll(){

renderMembers()
renderLessons()
renderTrainers()
updateChart()
updateAI()

}

</script>

</body>
</html>
