<style>
    :root { 
        --bg: #050505; 
        --card: #111113; 
        --accent: #d2fe00; 
        --text: #ffffff; 
        --muted: #8e8e93; 
        --border: #1c1c1e; 
        --danger: #ff3b30; 
        --success: #34c759; 
        --warning: #ffcc00; 
    }

    /* Bozuk ekranı düzelten kritik ayarlar */
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: var(--bg); /* Arka planı kesin olarak siyah yap */
        color: var(--text);
        overflow-x: hidden;
    }

    * { 
        box-sizing: border-box; 
        font-family: 'Plus Jakarta Sans', sans-serif; 
    }

    body { 
        min-height: 100vh;
        padding-bottom: 120px; /* Navigasyon için boşluk */
    }

    /* Container görünürlüğünü garanti altına al */
    .container { 
        max-width: 600px; 
        margin: 0 auto; 
        padding: 20px; 
        display: none; /* JS ile açılır */
        width: 100%;
    }

    /* Card tasarımlarını netleştir */
    .card { 
        background: var(--card); 
        border-radius: 24px; 
        padding: 20px; 
        margin-bottom: 15px; 
        border: 1px solid var(--border); 
        position: relative;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    
    /* Paylaşma butonu görseli düzeltme */
    .share-card {
        background: linear-gradient(135deg, #1a1a1c 0%, #050505 100%) !important;
        border: 1px solid var(--accent) !important;
    }
</style>
