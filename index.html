<div class="card" style="background: linear-gradient(135deg, #1a1a1c 0%, #050505 100%); border: 1px solid var(--accent);">
    <h4 style="margin-top:0; color:var(--accent);">📢 Stüdyonu Büyüt</h4>
    <p style="font-size:11px; color:var(--muted); margin-bottom:15px;">Uygulama linkini üyelerine veya sosyal medyada paylaş.</p>
    <button class="btn" onclick="app.shareApp()" style="background:white; color:black;">
        🔗 Uygulamayı Paylaş
    </button>
</div>

<script>
// app nesnesinin içine şu fonksiyonu ekledim:
app.shareApp = async () => {
    const shareData = {
        title: 'Studio Pro Manager',
        text: 'Stüdyo randevu ve seans takibi için uygulamamızı kullanabilirsiniz:',
        url: window.location.href // Mevcut uygulama linkini otomatik alır
    };

    try {
        if (navigator.share) {
            await navigator.share(shareData);
        } else {
            // Masaüstü tarayıcılar için linki kopyalama alternatifi
            await navigator.clipboard.writeText(window.location.href);
            alert("Uygulama linki kopyalandı! İstediğiniz yere yapıştırabilirsiniz.");
        }
    } catch (err) {
        console.log("Paylaşım iptal edildi veya bir hata oluştu.");
    }
};
</script>
